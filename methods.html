<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Input Methods</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
}
.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
}
input, button {
    padding: 10px;
    margin: 8px 5px;
}
.result {
    margin-top: 20px;
    padding: 12px;
    background: #e2e8f0;
}
</style>

</head>

<body>

<div class="container">
    <h1>All Input Methods (JS + jQuery)</h1>

    <input type="text" id="nameInput" placeholder="Enter your name">

    <br>

    <button onclick="getById()">JS getElementById</button>
    <button onclick="getByQuery()">JS querySelector</button>
    <button onclick="getByName()">JS getElementsByName</button>

    <button id="jqVal">jQuery .val()</button>
    <button id="jqText">jQuery .text()</button>
    <button id="jqHtml">jQuery .html()</button>

    <div class="result" id="output">Output...</div>
</div>

<script>

// ---------------- PURE JS METHODS ----------------

// 1. getElementById
function getById() {
    let value = document.getElementById("nameInput").value;
    document.getElementById("output").innerText = "getElementById: " + value;
}

// 2. querySelector
function getByQuery() {
    let value = document.querySelector("#nameInput").value;
    document.getElementById("output").innerText = "querySelector: " + value;
}

// 3. getElementsByName
function getByName() {
    let value = document.getElementsByName("username")[0]?.value || "No name attr";
    document.getElementById("output").innerText = "getElementsByName: " + value;
}

// ---------------- jQuery METHODS ----------------

$(document).ready(function(){

    // .val()
    $("#jqVal").click(function(){
        let value = $("#nameInput").val();
        $("#output").text("jQuery .val(): " + value);
    });

    // .text()
    $("#jqText").click(function(){
        let value = $("#nameInput").val();
        $("#output").text("jQuery .text(): " + value);
    });

    // .html()
    $("#jqHtml").click(function(){
        let value = $("#nameInput").val();
        $("#output").html("<b>jQuery .html(): " + value + "</b>");
    });

});

</script>

</body>
</html>
