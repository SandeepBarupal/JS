<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Value Demo</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
}
.container {
    max-width: 800px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
}
input, button {
    padding: 10px;
    margin-top: 10px;
}
.result {
    margin-top: 20px;
    padding: 10px;
    background: #e2e8f0;
}
</style>

</head>

<body>

<div class="container">
    <h1>Input Value Demo (.val & .text)</h1>

    <!-- Input -->
    <input type="text" id="nameInput" placeholder="Enter your name">

    <br>

    <!-- Buttons -->
    <button id="getVal">Get Value (.val)</button>
    <button id="setText">Show with .text()</button>

    <!-- Output -->
    <div class="result" id="output">Output yahan dikhega...</div>
</div>

<script>

$(document).ready(function(){

    // .val() → input ki value lene ke liye
    $("#getVal").click(function(){
        let name = $("#nameInput").val();
        alert("Value: " + name);
    });

    // .text() → text set karne ke liye
    $("#setText").click(function(){
        let name = $("#nameInput").val();
        $("#output").text("Hello " + name);
    });

});

</script>

</body>
</html>
